<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Multicolor Website</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
</style>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    nav {
        background-color: blueviolet;
        padding: 20px 0;
    }

    ul li {
        list-style: none;
        display: inline;
        padding: 0 20px;
        font-weight: bolder;
        color: white;
    }

    .main-container {
        background-color: lightblue;
        height: 700px;
    }

    .container1 {
        background-color: lightcoral;
        height: 450px;
        width: 600px;
        margin: 120px auto;
        position: absolute;
        top: 28%;
        left: 30%;
        transform: translate(-50%, -50%);
    }

    .container2 {
        background-color: rgb(71, 123, 182);
        height: 450px;
        width: 600px;
        margin: 120px auto;
        position: absolute;
        top: 28%;
        left: 70%;
        transform: translate(-50%, -50%);
    }

    .container3 {
        background-color: lightpink;
        height: 300px;
        width: 800px;
        margin: 100px auto;
        padding-bottom: 90px;
        position: absolute;
        top: 90%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-radius: 50px;
    }

    .content {
        font-family: 'Poppins', sans-serif;
        font-size: 55px;
        text-align: center;
        padding: 65px 0;
        position: absolute;
        margin-right: 0px;
    }

    .sticky-circular-logo {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        /* z-index: 9999; */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    footer {
        background-color: lightgray;
        text-align: center;
        padding: 20px 0;
        position: absolute;
        /* bottom: 0%; */
        top: 120%;
        width: 100%;
    }
</style>

<body>
    <header>
        <nav>
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </nav>
    </header>
    <div class="container main-container">
        <div class="container1"></div>
        <div class="container2"></div>
    </div>
    <div class="container3">
        <div class="content">
            <p>
                Welcome to this Sigma Web Development Express
            </p>
        </div>
    </div>
    <div>
        <footer>
            <p>&copy; 2026 Sigma Web Development Express. All rights reserved.</p>
        </footer>
    </div>
    <div>
        <img src="logo.jpg" alt="Sticky Logo" class="sticky-circular-logo">
    </div>
</body>

</html>
